  <g>
    <rect x="132" y="1332" width="1536" height="250" rx="52" fill="#ffffff" opacity="0.97"/>
    <text x="188" y="1426" font-family="Manrope, Arial, sans-serif" font-size="44" font-weight="800" fill="#17324d">Seasonal dock, lift, repair, storage, winterization, and shoreline service.</text>
    <text x="188" y="1499" font-family="Source Sans 3, Arial, sans-serif" font-size="38" fill="#3f6788">Tell Midwest the lake, property address, and shoreline change to get to a faster estimate.</text>
  </g>
