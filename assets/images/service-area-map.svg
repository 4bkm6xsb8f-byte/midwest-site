    <text x="1614" y="696" text-anchor="end" fill="#ffffff" stroke="none">High Falls Flowage</text>

    <circle cx="972" cy="1059" r="14" stroke="none"/>
    <path d="M958 1059H776" stroke-width="6"/>
    <text x="730" y="1070" text-anchor="end" fill="#ffffff" stroke="none">Shawano</text>
