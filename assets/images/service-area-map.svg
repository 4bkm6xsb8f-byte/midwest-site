  <g fill="none" stroke="#dbe7f1" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path stroke-width="4" d="M175 123c29 31 51 66 68 105 17 42 26 84 24 125"/>
    <path stroke-width="4" d="M274 123c36 30 61 66 76 107 14 39 18 82 13 130"/>
    <path stroke-width="4" d="M378 110c42 30 70 66 84 109 14 44 14 90 0 139"/>
    <path stroke-width="4" d="M487 124c22 25 38 54 49 85 14 42 16 88 7 139"/>
    <path stroke-width="3" d="M146 208h470"/>
    <path stroke-width="3" d="M168 304h410"/>
  </g>

  <g font-family="Manrope, Arial, sans-serif" fill="#ffffff">
    <text x="58" y="78" font-size="28" font-weight="800">Bodies of Water Serviced by Midwest</text>
    <text x="58" y="108" font-size="16" opacity="0.85">Based in Mountain, Wisconsin and serving lake properties across Northeast Wisconsin.</text>
  </g>

