<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1800" role="img" aria-labelledby="title desc">
  <title id="title">Bodies of Water Serviced by Midwest</title>
  <desc id="desc">Branded service-area map highlighting Mountain, Crivitz, Shawano, Lake Noquebay, Legend Lake, White Potato Lake, Chute Pond, and High Falls Flowage in Northeast Wisconsin.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#183650"/>
      <stop offset="100%" stop-color="#315777"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ed6c5"/>
      <stop offset="100%" stop-color="#1f8a78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0b1a26" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1800" height="1800" rx="120" fill="#edf3f8"/>
  <rect x="46" y="46" width="1708" height="1708" rx="94" fill="url(#bg)"/>

  <g opacity="0.18">
    <path d="M356 486c109-135 262-206 426-203 113-78 256-107 396-70 154 41 282 143 345 291 68 160 57 335-37 483-101 158-259 252-456 277-120 15-237 1-344-40-151 56-315 42-449-44C82 1081 5 921 28 725c17-94 57-176 121-239 53-54 123-93 207-120z" fill="#ffffff"/>
  </g>

  <g fill="none" stroke="#d9e8f3" stroke-linecap="round" opacity="0.8">
    <path d="M412 577c95 79 157 166 186 263 25 86 28 181 6 286" stroke-width="10"/>
    <path d="M646 503c105 84 175 180 210 286 31 94 38 191 19 295" stroke-width="10"/>
    <path d="M907 460c116 95 191 202 226 322 31 105 34 212 8 321" stroke-width="10"/>
    <path d="M1185 514c84 77 146 166 181 264 34 98 42 200 24 307" stroke-width="10"/>
    <path d="M356 752h1090" stroke-width="8"/>
    <path d="M388 1017h1024" stroke-width="8"/>
  </g>

  <g font-family="Manrope, Arial, sans-serif" fill="#ffffff">
    <text x="140" y="186" font-size="84" font-weight="800">Bodies of Water Serviced by Midwest</text>
    <text x="140" y="262" font-size="36" opacity="0.9">Based in Mountain, Wisconsin and serving lake properties throughout Northeast Wisconsin.</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="535" cy="679" rx="83" ry="78" fill="url(#water)"/>
    <ellipse cx="626" cy="859" rx="95" ry="102" fill="url(#water)"/>
    <ellipse cx="817" cy="821" rx="93" ry="95" fill="url(#water)"/>
    <ellipse cx="984" cy="989" rx="104" ry="96" fill="url(#water)"/>
    <ellipse cx="1162" cy="781" rx="98" ry="94" fill="url(#water)"/>
    <ellipse cx="1266" cy="972" rx="90" ry="100" fill="url(#water)"/>
    <ellipse cx="1402" cy="758" rx="78" ry="73" fill="url(#water)"/>
    <ellipse cx="1498" cy="618" rx="63" ry="60" fill="url(#water)"/>
  </g>

  <g fill="#ffffff" font-family="IBM Plex Mono, monospace" font-size="31" font-weight="500" stroke="#ffffff" stroke-linecap="round">
    <circle cx="552" cy="659" r="14" stroke="none"/>
    <path d="M566 659h178" stroke-width="6"/>
    <text x="774" y="670" fill="#ffffff" stroke="none">Mountain</text>

    <circle cx="632" cy="831" r="14" stroke="none"/>
    <path d="M646 831h154" stroke-width="6"/>
    <text x="828" y="842" fill="#ffffff" stroke="none">Crivitz</text>

    <circle cx="840" cy="801" r="14" stroke="none"/>
    <path d="M854 801h186" stroke-width="6"/>
    <text x="1070" y="812" fill="#ffffff" stroke="none">Lake Noquebay</text>

    <circle cx="1002" cy="966" r="14" stroke="none"/>
    <path d="M1016 966h178" stroke-width="6"/>
    <text x="1222" y="977" fill="#ffffff" stroke="none">Legend Lake</text>

    <circle cx="1177" cy="759" r="14" stroke="none"/>
    <path d="M1191 759h181" stroke-width="6"/>
    <text x="1398" y="770" fill="#ffffff" stroke="none">White Potato Lake</text>

    <circle cx="1284" cy="945" r="14" stroke="none"/>
    <path d="M1298 945h153" stroke-width="6"/>
