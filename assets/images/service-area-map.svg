  <g>
    <rect x="56" y="386" width="648" height="80" rx="20" fill="#ffffff" opacity="0.94"/>
    <text x="84" y="421" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800" fill="#17324d">Seasonal dock, lift, storage, winterization, repair, and shoreline service.</text>
    <text x="84" y="447" font-family="Source Sans 3, Arial, sans-serif" font-size="16" fill="#3f6788">Tell Midwest the lake, property address, and current setup to get to a more useful estimate faster.</text>
