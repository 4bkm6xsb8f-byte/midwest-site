<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Bodies of Water Serviced by Midwest</title>
  <desc id="desc">Illustrated Northeast Wisconsin service-area map highlighting Mountain, Crivitz, Shawano, Lake Noquebay, Legend Lake, White Potato Lake, Chute Pond, and High Falls Flowage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#17324d"/>
      <stop offset="100%" stop-color="#3f6788"/>
    </linearGradient>
    <linearGradient id="water" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7ed1c2"/>
      <stop offset="100%" stop-color="#1f8a78"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b1a26" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="760" height="520" rx="36" fill="#eef3f7"/>
  <rect x="20" y="20" width="720" height="480" rx="28" fill="url(#bg)"/>

  <g opacity="0.18">
    <path d="M151 107c43-33 100-43 152-30 48-18 100-19 147 0 51 20 86 57 103 111 15 50 10 102-17 148-27 46-69 76-127 91-36 9-72 8-107-2-47 12-93 6-135-19-52-30-82-72-92-130-13-72 10-127 76-169z" fill="#ffffff"/>
